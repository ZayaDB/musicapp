[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# API → Netlify Functions (SPA redirect보다 먼저)
[[redirects]]
  from = "/api/search"
  to = "/.netlify/functions/search"
  status = 200

# SPA + PWA
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 5173
