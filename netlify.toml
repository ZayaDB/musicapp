[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions.download]
  timeout = 26

[functions.fetch-audio]
  timeout = 26

[[redirects]]
  from = "/api/metadata"
  to = "/.netlify/functions/metadata"
  status = 200

[[redirects]]
  from = "/api/download"
  to = "/.netlify/functions/download"
  status = 200

[[redirects]]
  from = "/api/fetch-audio"
  to = "/.netlify/functions/fetch-audio"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 5173
